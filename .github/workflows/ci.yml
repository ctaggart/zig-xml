name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Test
        run: zig build test
      - name: Build examples
        run: zig build install-examples

